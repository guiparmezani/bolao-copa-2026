name: bolao-copa-2026-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao_copa_2026
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_copa_2026"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
